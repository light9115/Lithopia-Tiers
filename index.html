index.html<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lithopia Rankings</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#07111f;
    color:white;
}

.navbar{
    height:70px;
    background:#0c1728;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    border-bottom:1px solid #16263f;
}

.logo{
    font-size:32px;
    font-weight:bold;
    color:#53ff77;
}

.search{
    width:300px;
    padding:12px;
    border:none;
    border-radius:25px;
    background:#111f34;
    color:white;
}

.banner{
    margin:20px;
    padding:15px;
    background:#12233b;
    border-radius:12px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

.rankings{
    width:95%;
    margin:auto;
}

.player{
    display:flex;
    align-items:center;
    justify-content:space-between;

    background:#0d1b30;
    margin-bottom:12px;
    padding:18px;

    border-radius:14px;
    transition:.2s;
}

.player:hover{
    transform:translateY(-2px);
}

.left{
    display:flex;
    align-items:center;
    gap:15px;
}

.rank{
    width:60px;
    font-size:30px;
    font-weight:bold;
}

.head{
    width:64px;
    height:64px;
    border-radius:10px;
}

.info h2{
    margin-bottom:4px;
}

.info p{
    color:#8fa8d4;
}

.tier{
    padding:10px 18px;
    border-radius:20px;
    font-weight:bold;
}

.ht1{
    background:#ffd700;
    color:black;
}

.lt1{
    background:#c0c0c0;
    color:black;
}

.ht2{
    background:#ff944d;
}

.lt2{
    background:#70a7ff;
}

.ht3{
    background:#b56cff;
}

.lt3{
    background:#55d17a;
}

.ht4{
    background:#ff6b6b;
}

.lt4{
    background:#999;
}

.ht5{
    background:#666;
}

.lt5{
    background:#444;
}
</style>
</head>
<body>

<div class="navbar">
    <div class="logo">⚡ LITHOPIA</div>
    <input class="search" placeholder="Search player...">
</div>

<div class="banner">
    SERVER IP: COMING SOON!
</div>

<div class="rankings">

<div class="player">
<div class="left">
<div class="rank">#1</div>
<img class="head" src="https://mc-heads.net/avatar/Technoblade">
<div class="info">
<h2>Technoblade</h2>
<p>Combat Master</p>
</div>
</div>
<div class="tier ht1">HT1</div>
</div>

<div class="player">
<div class="left">
<div class="rank">#2</div>
<img class="head" src="https://mc-heads.net/avatar/Dream">
<div class="info">
<h2>Dream</h2>
<p>Combat Master</p>
</div>
</div>
<div class="tier lt1">LT1</div>
</div>

<div class="player">
<div class="left">
<div class="rank">#3</div>
<img class="head" src="https://mc-heads.net/avatar/Sapnap">
<div class="info">
<h2>Sapnap</h2>
<p>Combat Expert</p>
</div>
</div>
<div class="tier ht2">HT2</div>
</div>

<div class="player">
<div class="left">
<div class="rank">#4</div>
<img class="head" src="https://mc-heads.net/avatar/GeorgeNotFound">
<div class="info">
<h2>GeorgeNotFound</h2>
<p>Combat Expert</p>
</div>
</div>
<div class="tier lt2">LT2</div>
</div>

<div class="player">
<div class="left">
<div class="rank">#5</div>
<img class="head" src="https://mc-heads.net/avatar/TommyInnit">
<div class="info">
<h2>TommyInnit</h2>
<p>Combat Veteran</p>
</div>
</div>
<div class="tier ht3">HT3</div>
</div>

</div>

</body>
</html>
